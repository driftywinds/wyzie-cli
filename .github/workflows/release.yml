name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/wyzie-subs-linux-amd64    .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/wyzie-subs-linux-arm64    .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/wyzie-subs-windows-amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: |
            dist/wyzie-subs-linux-amd64
            dist/wyzie-subs-linux-arm64
            dist/wyzie-subs-windows-amd64.exe
